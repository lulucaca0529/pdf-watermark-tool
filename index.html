<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>PDF 浮水印</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --or:#FF5F1F;
  --or2:#e0541a;
  --bg:#0a0a0a;
  --bg2:#141414;
  --bg3:#1e1e1e;
  --bg4:#282828;
  --bd:rgba(255,255,255,0.08);
  --bdo:rgba(255,95,31,0.35);
  --tx:#f0ede8;
  --txm:#888880;
  --txd:#444440;
  --r:12px;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Noto Sans TC',sans-serif;font-size:15px;overscroll-behavior:none}

/* HEADER */
.hdr{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;gap:10px;
  padding:env(safe-area-inset-top,0) 16px 0;
  height:calc(52px + env(safe-area-inset-top,0));
  background:rgba(10,10,10,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--bd);
}
.logo{width:28px;height:28px;background:var(--or);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:#fff;border-radius:6px;flex-shrink:0}
.logo-t{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
.logo-t span{color:var(--or)}
.file-badge{margin-left:auto;font-size:11px;color:var(--txm);background:var(--bg3);padding:4px 10px;border-radius:20px;border:1px solid var(--bd);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* SCROLL BODY */
.body{
  padding-top:calc(52px + env(safe-area-inset-top,0));
  padding-bottom:calc(96px + env(safe-area-inset-bottom,0));
  overflow-y:auto;
  height:100%;
  -webkit-overflow-scrolling:touch;
}

/* SECTIONS */
.sec{padding:20px 16px;border-bottom:1px solid var(--bd)}
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.sec-num{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:var(--or);background:rgba(255,95,31,0.1);padding:3px 8px;border-radius:4px}
.sec-title{font-size:13px;font-weight:500;color:var(--txm);letter-spacing:0.5px}

/* UPLOAD */
.drop{
  border:1.5px dashed var(--bdo);border-radius:var(--r);
  padding:32px 16px;text-align:center;cursor:pointer;
  background:rgba(255,95,31,0.03);position:relative;
  transition:all 0.2s;
}
.drop.over{border-color:var(--or);background:rgba(255,95,31,0.08)}
.drop input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}
.drop-icon{margin:0 auto 12px;opacity:0.6;display:block}
.drop-t{font-size:14px;color:var(--txm);line-height:1.8}
.drop-t strong{color:var(--or);font-weight:500}

/* PREVIEW */
.preview-wrap{background:#000;border-radius:var(--r);overflow:hidden;position:relative;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%}
#preview-canvas{width:100% !important;height:auto !important;display:none;max-width:100%}
.preview-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--txd)}
.preview-empty p{font-size:12px;letter-spacing:1px;font-family:'Bebas Neue',sans-serif}

/* PAGE NAV */
.pnav{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:12px}
.pnav-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--bd);background:var(--bg3);color:var(--txm);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s}
.pnav-btn:disabled{opacity:0.25;cursor:default}
.pnav-btn:not(:disabled):active{background:var(--bg4);border-color:var(--or);color:var(--or)}
.pnav-lbl{font-size:13px;color:var(--txm);min-width:60px;text-align:center}

/* FIELDS */
.field{margin-bottom:16px}
.field:last-child{margin-bottom:0}
label{display:block;font-size:11px;letter-spacing:1px;color:var(--txm);text-transform:uppercase;margin-bottom:8px}
input[type=text],input[type=number]{
  width:100%;background:var(--bg3);border:1px solid var(--bd);
  color:var(--tx);padding:12px 14px;border-radius:10px;
  font-family:'Noto Sans TC',sans-serif;font-size:15px;outline:none;
  transition:border-color 0.2s;
  -webkit-appearance:none;
}
input[type=text]:focus,input[type=number]:focus{border-color:var(--or)}

/* RANGE */
.rrow{display:flex;align-items:center;gap:12px}
input[type=range]{
  flex:1;-webkit-appearance:none;height:4px;
  background:var(--bg4);border-radius:2px;outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:22px;height:22px;
  background:var(--or);border-radius:50%;cursor:pointer;
  box-shadow:0 0 0 4px rgba(255,95,31,0.15);
}
.rval{font-size:14px;color:var(--or);font-weight:500;min-width:44px;text-align:right}

/* COLOR */
.crow{display:flex;align-items:center;gap:10px}
input[type=color]{
  width:44px;height:44px;padding:3px;background:var(--bg3);
  border:1px solid var(--bd);border-radius:10px;cursor:pointer;
  -webkit-appearance:none;flex-shrink:0;
}
.chex{flex:1}

/* TOGGLE */
.tgroup{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tbtn{
  padding:12px 8px;background:var(--bg3);border:1px solid var(--bd);
  color:var(--txm);border-radius:10px;cursor:pointer;
  font-size:13px;font-family:'Noto Sans TC',sans-serif;text-align:center;
  transition:all 0.15s;
}
.tbtn:active{transform:scale(0.97)}
.tbtn.on{background:rgba(255,95,31,0.12);border-color:var(--or);color:var(--or)}

/* BOTTOM BAR */
.bbar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  padding:12px 16px env(safe-area-inset-bottom,0);
  background:rgba(10,10,10,0.95);
  backdrop-filter:blur(12px);
  border-top:1px solid var(--bd);
}
.dl-btn{
  width:100%;padding:16px;background:var(--or);color:#fff;border:none;
  border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:20px;
  letter-spacing:3px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:8px;transition:all 0.2s;
  -webkit-appearance:none;
}
.dl-btn:not(:disabled):active{background:var(--or2);transform:scale(0.98)}
.dl-btn:disabled{background:var(--bg4);color:var(--txd);cursor:not-allowed}
.prog{height:3px;background:var(--bg4);border-radius:2px;margin-top:10px;overflow:hidden;opacity:0;transition:opacity 0.2s}
.prog.on{opacity:1}
.prog-fill{height:100%;background:var(--or);border-radius:2px;transition:width 0.3s;width:0}

/* TOAST */
.toast{
  position:fixed;bottom:calc(96px + env(safe-area-inset-bottom,0) + 12px);
  left:16px;right:16px;z-index:200;
  background:var(--bg3);border:1px solid var(--bdo);
  color:var(--tx);padding:14px 16px;border-radius:12px;
  font-size:14px;display:flex;align-items:center;gap:10px;
  transform:translateY(20px);opacity:0;
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events:none;
}
.toast.on{transform:translateY(0);opacity:1}
.tdot{width:8px;height:8px;background:var(--or);border-radius:50%;flex-shrink:0}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">W</div>
  <div class="logo-t">WATER<span>MARK</span></div>
  <div class="file-badge" id="file-badge">未載入</div>
</header>

<div class="body">

  <!-- 上傳 -->
  <div class="sec">
    <div class="sec-hd"><span class="sec-num">01</span><span class="sec-title">上傳 PDF</span></div>
    <div class="drop" id="drop" onclick="document.getElementById('fi').click()">
      <input type="file" id="fi" accept=".pdf">
      <svg class="drop-icon" width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect x="5" y="3" width="24" height="32" rx="3" stroke="#FF5F1F" stroke-width="1.5"/>
        <path d="M25 3v10h10" stroke="#FF5F1F" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M17 22v8M13 27l4-4 4 4" stroke="#FF5F1F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="drop-t">點此選擇 PDF 檔案<br><strong>支援拖曳上傳</strong></div>
    </div>
  </div>

  <!-- 預覽 -->
  <div class="sec" id="preview-sec" style="display:none">
    <div class="sec-hd"><span class="sec-num">預覽</span><span class="sec-title">浮水印效果</span></div>
    <div class="preview-wrap">
      <canvas id="preview-canvas"></canvas>
      <div class="preview-empty" id="pe">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><rect x="5" y="3" width="24" height="32" rx="3" stroke="#444" stroke-width="1.5"/><path d="M25 3v10h10" stroke="#444" stroke-width="1.5" stroke-linecap="round"/></svg>
        <p>上傳後顯示預覽</p>
      </div>
    </div>
    <div class="pnav">
      <button class="pnav-btn" id="pb" onclick="go(-1)" disabled>‹</button>
      <span class="pnav-lbl" id="pl">— / —</span>
      <button class="pnav-btn" id="nb" onclick="go(1)" disabled>›</button>
    </div>
  </div>

  <!-- 浮水印文字 -->
  <div class="sec">
    <div class="sec-hd"><span class="sec-num">02</span><span class="sec-title">浮水印文字</span></div>
    <div class="field">
      <label>文字內容</label>
      <input type="text" id="wt" value="機密文件" placeholder="輸入文字">
    </div>
    <div class="field">
      <label>字體大小</label>
      <div class="rrow">
        <input type="range" id="ws" min="20" max="150" value="60">
        <span class="rval" id="wsv">60</span>
      </div>
    </div>
    <div class="field">
      <label>旋轉角度</label>
      <div class="rrow">
        <input type="range" id="wr" min="-90" max="90" value="-45">
        <span class="rval" id="wrv">-45°</span>
      </div>
    </div>
  </div>

  <!-- 樣式 -->
  <div class="sec">
    <div class="sec-hd"><span class="sec-num">03</span><span class="sec-title">樣式設定</span></div>
    <div class="field">
      <label>顏色</label>
      <div class="crow">
        <input type="color" id="wc" value="#808080">
        <input type="text" id="wch" class="chex" value="#808080">
      </div>
    </div>
    <div class="field">
      <label>透明度</label>
      <div class="rrow">
        <input type="range" id="wo" min="5" max="100" value="30">
        <span class="rval" id="wov">30%</span>
      </div>
    </div>
    <div class="field">
      <label>排列方式</label>
      <div class="tgroup">
        <button class="tbtn" id="ms" onclick="setMode('single')">單一置中</button>
        <button class="tbtn on" id="mt" onclick="setMode('tile')">全頁平鋪</button>
      </div>
    </div>
  </div>

</div>

<!-- 底部下載按鈕 -->
<div class="bbar">
  <button class="dl-btn" id="dlb" disabled onclick="download()">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2v10M5 8l4 4 4-4M2 15h14" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    套用並下載
  </button>
  <div class="prog" id="prog"><div class="prog-fill" id="pf"></div></div>
</div>

<div class="toast" id="toast"><div class="tdot"></div><span id="tmsg"></span></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfBytes=null, pdfDoc=null, cur=1, total=0, mode='tile';

// Upload
const fi=document.getElementById('fi');
fi.addEventListener('change',()=>{if(fi.files[0])load(fi.files[0])});

const drop=document.getElementById('drop');
document.body.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('over')});
document.body.addEventListener('dragleave',()=>drop.classList.remove('over'));
document.body.addEventListener('drop',e=>{
  e.preventDefault();drop.classList.remove('over');
  const f=e.dataTransfer.files[0];
  if(f&&f.type==='application/pdf')load(f);
  else toast('請上傳 PDF 格式');
});

async function load(file){
  const buf=await file.arrayBuffer();
  pdfBytes=new Uint8Array(buf);
  pdfDoc=await pdfjsLib.getDocument({data:pdfBytes.slice()}).promise;
  total=pdfDoc.numPages; cur=1;
  document.getElementById('file-badge').textContent=file.name.length>14?file.name.slice(0,12)+'…':file.name;
  document.getElementById('dlb').disabled=false;
  document.getElementById('preview-sec').style.display='block';
  document.getElementById('pb').disabled=true;
  document.getElementById('nb').disabled=total<=1;
  updatePL();
  render();
  toast('已載入：'+file.name);
  document.getElementById('preview-sec').scrollIntoView({behavior:'smooth',block:'start'});
}

async function render(){
  if(!pdfDoc)return;
  const page=await pdfDoc.getPage(cur);
  const wrap=document.getElementById('preview-canvas').parentElement;
  const cw=wrap.clientWidth||window.innerWidth-32;
  const vp0=page.getViewport({scale:1});
  const scale=cw/vp0.width;
  const vp=page.getViewport({scale});
  const canvas=document.getElementById('preview-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=vp.width; canvas.height=vp.height;
  canvas.style.display='block';
  canvas.style.width='100%';
  canvas.style.height='auto';
  document.getElementById('pe').style.display='none';
  await page.render({canvasContext:ctx,viewport:vp}).promise;
  wmOverlay(ctx,canvas.width,canvas.height,scale);
}

function wmOverlay(ctx,w,h,scale){
  const tx=document.getElementById('wt').value||'浮水印';
  const sz=parseInt(document.getElementById('ws').value)*scale;
  const ang=parseInt(document.getElementById('wr').value)*Math.PI/180;
  const col=document.getElementById('wc').value;
  const op=parseInt(document.getElementById('wo').value)/100;
  ctx.save();
  ctx.globalAlpha=op;
  ctx.font=`bold ${sz}px 'Noto Sans TC',sans-serif`;
  ctx.fillStyle=col;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  if(mode==='single'){
    ctx.translate(w/2,h/2); ctx.rotate(ang); ctx.fillText(tx,0,0);
  } else {
    const m=ctx.measureText(tx);
    const tw=m.width+sz*1.5, th=sz*2.5;
    ctx.translate(w/2,h/2); ctx.rotate(ang);
    for(let y=-h;y<h*2;y+=th)for(let x=-w;x<w*2;x+=tw)ctx.fillText(tx,x,y);
  }
  ctx.restore();
}

function setMode(m){
  mode=m;
  document.getElementById('ms').classList.toggle('on',m==='single');
  document.getElementById('mt').classList.toggle('on',m==='tile');
  render();
}

function go(d){
  cur=Math.max(1,Math.min(total,cur+d));
  document.getElementById('pb').disabled=cur<=1;
  document.getElementById('nb').disabled=cur>=total;
  updatePL(); render();
}
function updatePL(){document.getElementById('pl').textContent=cur+' / '+total}

['wt','ws','wr','wc','wo'].forEach(id=>{
  document.getElementById(id).addEventListener('input',e=>{
    const v=e.target.value;
    if(id==='ws')document.getElementById('wsv').textContent=v;
    if(id==='wr')document.getElementById('wrv').textContent=v+'°';
    if(id==='wo')document.getElementById('wov').textContent=v+'%';
    if(id==='wc')document.getElementById('wch').value=v;
    render();
  });
});
document.getElementById('wch').addEventListener('input',e=>{
  if(/^#[0-9a-fA-F]{6}$/.test(e.target.value)){
    document.getElementById('wc').value=e.target.value;render();
  }
});

// Build watermark PNG
function buildWM(w,h){
  const tx=document.getElementById('wt').value||'浮水印';
  const sz=parseInt(document.getElementById('ws').value);
  const ang=parseInt(document.getElementById('wr').value)*Math.PI/180;
  const col=document.getElementById('wc').value;
  const op=parseInt(document.getElementById('wo').value)/100;
  const sc=2, wc=document.createElement('canvas');
  wc.width=w*sc; wc.height=h*sc;
  const ctx=wc.getContext('2d');
  ctx.scale(sc,sc);
  ctx.font=`bold ${sz}px 'Noto Sans TC',sans-serif`;
  ctx.fillStyle=col; ctx.globalAlpha=op;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const rad=ang;
  if(mode==='single'){
    ctx.save();ctx.translate(w/2,h/2);ctx.rotate(rad);ctx.fillText(tx,0,0);ctx.restore();
  } else {
    const m=ctx.measureText(tx);
    const tw=m.width+sz*1.5, th=sz*2.5;
    ctx.save();ctx.translate(w/2,h/2);ctx.rotate(rad);
    for(let y=-h;y<h*2;y+=th)for(let x=-w;x<w*2;x+=tw)ctx.fillText(tx,x,y);
    ctx.restore();
  }
  const d=atob(wc.toDataURL('image/png').split(',')[1]);
  const b=new Uint8Array(d.length);
  for(let i=0;i<d.length;i++)b[i]=d.charCodeAt(i);
  return b;
}

async function download(){
  if(!pdfBytes)return;
  const btn=document.getElementById('dlb');
  const prog=document.getElementById('prog');
  const pf=document.getElementById('pf');
  btn.disabled=true; prog.classList.add('on');
  try{
    const {PDFDocument}=PDFLib;
    const doc=await PDFDocument.load(pdfBytes);
    const pages=doc.getPages();
    for(let i=0;i<pages.length;i++){
      const pg=pages[i];
      const {width,height}=pg.getSize();
      pf.style.width=((i+1)/pages.length*100)+'%';
      const png=await doc.embedPng(buildWM(width,height));
      pg.drawImage(png,{x:0,y:0,width,height});
    }
    const out=await doc.save();
    const url=URL.createObjectURL(new Blob([out],{type:'application/pdf'}));
    const a=document.createElement('a');
    a.href=url;
    a.download='浮水印_'+new Date().toLocaleDateString('zh-TW').replace(/\//g,'')+'.pdf';
    a.click();
    URL.revokeObjectURL(url);
    toast('PDF 已下載完成 ✓');
  }catch(err){
    toast('處理失敗，請重試');
    console.error(err);
  }
  btn.disabled=false;
  setTimeout(()=>{prog.classList.remove('on');pf.style.width='0'},800);
}

function toast(msg){
  const t=document.getElementById('toast');
  document.getElementById('tmsg').textContent=msg;
  t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),3000);
}
</script>
</body>
</html>
